<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">Agent loop architecture</title>
  <desc id="desc">A model plans, calls tools, observes results, updates state, and repeats until done.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#21c7a8"/>
    </marker>
  </defs>
  <rect width="1100" height="520" rx="22" fill="#11151c"/>
  <g fill="#202633" stroke="#303846" stroke-width="3">
    <rect x="88" y="168" width="220" height="120" rx="12"/>
    <rect x="438" y="72" width="230" height="120" rx="12"/>
    <rect x="792" y="168" width="220" height="120" rx="12"/>
    <rect x="438" y="330" width="230" height="120" rx="12"/>
  </g>
  <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <text x="198" y="218" fill="#f5f7fa" font-size="30" font-weight="700">User Goal</text>
    <text x="198" y="254" fill="#b1bbc9" font-size="20">intent + constraints</text>
    <text x="553" y="120" fill="#f5f7fa" font-size="30" font-weight="700">Model</text>
    <text x="553" y="156" fill="#b1bbc9" font-size="20">reason + choose action</text>
    <text x="902" y="218" fill="#f5f7fa" font-size="30" font-weight="700">Tools</text>
    <text x="902" y="254" fill="#b1bbc9" font-size="20">APIs + functions</text>
    <text x="553" y="378" fill="#f5f7fa" font-size="30" font-weight="700">State</text>
    <text x="553" y="414" fill="#b1bbc9" font-size="20">messages + data + control</text>
  </g>
  <g fill="none" stroke="#21c7a8" stroke-width="5" marker-end="url(#arrow)">
    <path d="M308 204 C358 150 382 132 438 132"/>
    <path d="M668 132 C724 132 742 151 792 204"/>
    <path d="M902 288 C858 356 754 390 668 390"/>
    <path d="M438 390 C326 372 220 322 198 288"/>
    <path d="M553 330 L553 202"/>
  </g>
  <text x="550" y="490" fill="#ffb84d" font-family="Inter, Arial, sans-serif" font-size="24" text-anchor="middle">The loop is useful only when control, state, and side effects are explicit enough to operate.</text>
</svg>
